<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thynka - Proyección de Calificaciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b6b47;
            --primary-light: #a3846c;
            --primary-dark: #6b5538;
            --cream: #f8f5f2;
            --beige: #f0e6dc;
            --brown: #5a4032;
            --gray: #9a9a9a;
            --white: #ffffff;
            --shadow: rgba(107, 85, 56, 0.1);
            --text-primary: #5a4032;
            --text-secondary: #9a9a9a;
            --bg-primary: #f8f5f2;
            --bg-secondary: #ffffff;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #d97706;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 40px;
            background: var(--bg-secondary);
            box-shadow: 0 2px 10px var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .target-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--bg-primary);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid var(--beige);
        }

        .target-control input {
            width: 60px;
            padding: 5px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--primary-dark);
        }

        main {
            flex: 1;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .subject-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px var(--shadow);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-light);
            box-shadow: 0 15px 40px rgba(139, 107, 71, 0.2);
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 5px; height: 100%;
            background: var(--primary);
        }
        
        .subject-card.finished::before { background: var(--success); }

        .subject-card h3 { font-size: 1.4rem; margin-bottom: 10px; color: var(--primary-dark); }

        .subject-stats { display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.9rem; color: var(--text-secondary); flex-direction: column; gap: 5px; }
        .subject-grade-display { font-size: 2rem; font-weight: bold; color: var(--text-primary); }
        .subject-status { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .status-active { color: var(--warning); }
        .status-finished { color: var(--success); }
        
        .warning-text { color: var(--danger); font-size: 0.8rem; margin-top: 5px; font-style: italic; }

        .add-subject-card {
            border: 2px dashed var(--beige);
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--gray);
            min-height: 200px;
        }
        .add-subject-card:hover { border-color: var(--primary); color: var(--primary); transform: none; box-shadow: none; }
        .add-subject-card i { font-size: 3rem; margin-bottom: 10px; }

        .detail-header { margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px; }
        .detail-top-row { display: flex; align-items: center; gap: 20px; }

        .btn-back {
            background: var(--bg-secondary);
            border: 1px solid var(--beige);
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--primary-dark);
            font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .btn-back:hover { background: var(--primary); color: white; }

        .detail-title h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--primary-dark); }

        .projection-banner {
            background: var(--bg-primary);
            border-left: 4px solid var(--warning);
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .projection-number { font-weight: bold; color: var(--warning); font-size: 1.3rem; }
        .secured-text { color: var(--success); font-weight: bold; }
        .impossible-text { color: var(--danger); font-weight: bold; }

        .cuts-container { display: flex; flex-direction: column; gap: 30px; }

        .cut-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px var(--shadow);
            border-left: 5px solid var(--primary-light);
        }
        
        /* Estilo cuando la materia está terminada */
        .cut-card.disabled { opacity: 0.7; pointer-events: none; filter: grayscale(1); }

        .cut-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--beige); }
        .cut-info h3 { font-size: 1.3rem; color: var(--primary-dark); }
        .cut-projection { font-size: 0.9rem; color: var(--text-secondary); margin-top: 5px; }
        .cut-projection span { font-weight: bold; color: var(--text-primary); }

        .cut-weight-badge { background: var(--beige); padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; color: var(--primary); }

        .grades-list { display: flex; flex-direction: column; gap: 15px; }

        .grade-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }

        .grade-info { flex: 1; padding-right: 20px; }
        .grade-name { font-weight: 500; font-size: 1rem; }
        .grade-subinfo { font-size: 0.8rem; color: var(--text-secondary); }

        .grade-input-wrapper {
            position: relative;
            width: 120px;
            height: 50px;
        }

        .grade-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: 2px solid var(--beige);
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            color: var(--text-primary);
            transition: 0.2s;
            position: relative;
            z-index: 2;
            padding: 0;
        }

        .grade-input:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.5);
        }

        .projection-ghost {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            color: var(--gray); 
            opacity: 0.5; 
            font-size: 0.9rem;
            font-weight: 600;
            pointer-events: none;
            z-index: 1;
            white-space: nowrap;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px;
            font-size: 1rem;
            transition: 0.2s;
            margin-left: 15px;
            width: 30px; height: 30px;
            display:flex; align-items:center; justify-content:center;
            border-radius: 50%;
        }
        .btn-icon:hover { color: var(--danger); background: rgba(220, 38, 38, 0.1); transform: scale(1.1); }
        .btn-icon.add { color: var(--success); }
        .btn-icon.add:hover { color: var(--primary-dark); background: rgba(139, 107, 71, 0.1); }

        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #15803d; }
        .btn-danger { background: var(--danger); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal { background: var(--bg-secondary); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; transform: scale(0.9); transition: 0.3s; }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal h3 { font-family: 'Playfair Display', serif; color: var(--primary-dark); margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: var(--text-secondary); }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--beige); border-radius: 8px; background: var(--bg-primary); color: var(--text-primary); }

        .congrats-msg {
            background: linear-gradient(90deg, var(--success), #22c55e);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 5px 15px rgba(22, 163, 74, 0.3);
        }
        
        .fail-msg {
            background: linear-gradient(90deg, var(--danger), #ef4444);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-graduation-cap"></i> Thynka
        </div>
        <div class="target-control">
            <label><i class="fas fa-bullseye"></i> Meta Global (0-50):</label>
            <input type="number" id="globalTarget" value="35" min="0" max="50">
        </div>
    </header>

    <main>
        <!-- View 1: List of Subjects -->
        <section id="viewList" class="view-section active">
            <div class="subjects-grid" id="subjectsGrid">
                <!-- Subject Cards Injected Here -->
            </div>
        </section>

        <!-- View 2: Subject Details -->
        <section id="viewDetail" class="view-section">
            <div id="globalResultBanner"></div>
            
            <div class="detail-header">
                <div class="detail-top-row">
                    <button class="btn-back" onclick="goBack()">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <div class="detail-title">
                        <h1 id="detailSubjectName">Nombre Materia</h1>
                    </div>
                    <div style="margin-left: auto; display:flex; gap:10px;">
                        <button id="btnFinishSubject" class="btn btn-success" onclick="toggleSubjectFinish()">
                            <i class="fas fa-check-circle"></i> Finalizar Materia
                        </button>
                        <button id="btnAddCut" class="btn btn-outline" onclick="openModal('cut')">
                            <i class="fas fa-plus"></i> Corte
                        </button>
                        <button class="btn btn-danger" onclick="deleteCurrentSubject()">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                    <div class="detail-meta" style="font-size: 1.1rem;">
                        Promedio Actual: <strong id="detailSubjectAvg" style="color:var(--primary-dark); font-size:1.3rem;">0.0</strong>
                    </div>
                    <div id="subjectProjectionContainer"></div>
                </div>
            </div>

            <div class="cuts-container" id="cutsContainer">
                <!-- Cuts Injected Here -->
            </div>
        </section>
    </main>

    <!-- Modals -->
    <div class="modal-overlay" id="modalSubject">
        <div class="modal">
            <h3>Nueva Materia</h3>
            <div class="form-group"><label>Nombre</label><input type="text" id="subNameInput" class="form-control"></div>
            <div style="text-align:right"><button class="btn" onclick="saveSubject()">Crear</button><button class="btn btn-outline" style="border:none" onclick="closeModals()">Cancelar</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalCut">
        <div class="modal">
            <h3>Nuevo Corte/Periodo</h3>
            <div class="form-group"><label>Nombre (Ej. Corte 1)</label><input type="text" id="cutNameInput" class="form-control"></div>
            <div class="form-group"><label>Valor del Corte (%)</label><input type="number" id="cutWeightInput" class="form-control" min="1" max="100"></div>
            <div style="text-align:right"><button class="btn" onclick="saveCut()">Agregar</button><button class="btn btn-outline" style="border:none" onclick="closeModals()">Cancelar</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalGrade">
        <div class="modal">
            <h3>Nueva Nota</h3>
            <div class="form-group"><label>Nombre de Evaluación</label><input type="text" id="gradeNameInput" class="form-control"></div>
            <div class="form-group"><label>Porcentaje (%)</label><input type="number" id="gradeWeightInput" class="form-control" min="1" max="100"></div>
            <div style="text-align:right"><button class="btn" onclick="saveGrade()">Agregar</button><button class="btn btn-outline" style="border:none" onclick="closeModals()">Cancelar</button></div>
        </div>
    </div>

    <script>
        const state = {
            targetGlobal: 35,
            subjects: [], 
            currentSubjectId: null,
            tempCutId: null 
        };
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // --- PERSISTENCIA LOCAL (LOCALSTORAGE) ---
        
        // Función para guardar en el navegador
        function saveToLocal() {
            localStorage.setItem('thynka_data', JSON.stringify(state));
        }

        // Cargar datos al iniciar
        try {
            const savedData = localStorage.getItem('thynka_data');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                state.targetGlobal = parsed.targetGlobal || 35;
                state.subjects = parsed.subjects || [];
                document.getElementById('globalTarget').value = state.targetGlobal;
            }
        } catch (e) {
            console.error("Error cargando datos locales", e);
        }

        // --- FIN PERSISTENCIA ---

        // Lógica de compensación corregida para incluir materias terminadas en el cálculo
        function getSubjectCompensationTarget(subjectId) {
            // Incluimos TODAS las materias para el sumatorio total
            const totalSubjects = state.subjects.length;
            if (totalSubjects === 0) return { target: state.targetGlobal, isCapped: false, finalMaxAvg: null };

            // Suma de puntos reales (incluye las finalizadas)
            let totalSum = 0;
            state.subjects.forEach(s => {
                let score = 0;
                s.cuts.forEach(c => {
                    let cs = 0;
                    c.grades.forEach(g => { 
                        if(g.value !== "") cs += (parseFloat(g.value)*g.weight/100); 
                    });
                    score += (cs * (c.weight/100));
                });
                totalSum += score;
            });

            // Puntos totales necesarios para alcanzar la meta global
            const pointsNeeded = state.targetGlobal * totalSubjects;
            const deficit = pointsNeeded - totalSum;
            
            // El déficit se reparte SOLO entre las materias ABIERTAS
            const openSubjectsCount = state.subjects.filter(s => !s.isFinished).length;
            
            const currentSubject = state.subjects.find(s => s.id === subjectId);
            if(!currentSubject) return { target: state.targetGlobal, isCapped: false, finalMaxAvg: null };

            // Si la materia está terminada, retorna 0 (no se usa en la vista de detalle para meta)
            if (currentSubject.isFinished) {
                return { target: 0, isCapped: false, finalMaxAvg: null };
            }

            // Si no hay materias abiertas, no se puede compensar más
            if (openSubjectsCount === 0) return { target: state.targetGlobal, isCapped: false, finalMaxAvg: null };

            // Calculamos cuánto necesita cada materia abierta para cubrir el déficit global
            const compensation = deficit / openSubjectsCount;
            
            // Calculamos la nota actual de esta materia
            let currentSubScore = 0;
            currentSubject.cuts.forEach(c => {
                let cs = 0;
                c.grades.forEach(g => { if(g.value!=="") cs += (parseFloat(g.value)*g.weight/100); });
                currentSubScore += (cs * (c.weight/100));
            });
            
            const rawTarget = currentSubScore + compensation;
            const isCapped = rawTarget > 50;
            const finalTarget = isCapped ? 50 : rawTarget;

            // Si está capado, calculamos cuál será el promedio real si saca 50 en todas las abiertas
            let finalMaxAvg = null;
            if (isCapped) {
                // Suma actual (fijas) + (50 * num materias abiertas)
                const projectedSum = totalSum + (50 * openSubjectsCount) - (currentSubScore * openSubjectsCount); // Ajuste simple para proyección
                // Nota: Cálculo aproximado de cuánto subiría el global si todo queda en 50
                const actualFixedSum = state.subjects.filter(s => s.isFinished).reduce((acc, s) => {
                    let sc = 0; s.cuts.forEach(c => { let cs=0; c.grades.forEach(g=>{if(g.value!=="")cs+=parseFloat(g.value)*g.weight/100}); sc+=cs*c.weight/100});
                    return acc + sc;
                }, 0);
                
                const openProjected = 50 * openSubjectsCount;
                finalMaxAvg = (actualFixedSum + openProjected) / totalSubjects;
            }

            return { target: finalTarget, isCapped, finalMaxAvg };
        }

        // Lógica Cascada (Corte a Corte)
        function calculateCascadingProjections(subject, subjectTarget) {
            let currentSubjectScore = 0;
            let cutData = [];

            subject.cuts.forEach(cut => {
                let currentCutScore = 0;
                let filledGradeWeight = 0; 
                let isCutFull = true;

                cut.grades.forEach(grade => {
                    if (grade.value !== "" && grade.value !== null) {
                        currentCutScore += (parseFloat(grade.value) * grade.weight / 100);
                        filledGradeWeight += grade.weight;
                    } else {
                        isCutFull = false;
                    }
                });

                const contributionToSubject = currentCutScore * (cut.weight / 100);
                currentSubjectScore += contributionToSubject;

                cutData.push({
                    ...cut,
                    currentCutScore: currentCutScore,
                    filledGradeWeight: filledGradeWeight,
                    isCutFull: isCutFull
                });
            });

            // 2. Determinar qué peso y puntos están "asegurados" por cortes completos
            let lockedScore = 0;
            let lockedWeight = 0;
            
            cutData.forEach(cut => {
                if (cut.isCutFull) {
                    lockedScore += (cut.currentCutScore * (cut.weight / 100));
                    lockedWeight += cut.weight;
                }
            });

            const totalPointsNeeded = subjectTarget;
            const pointsDeficit = totalPointsNeeded - lockedScore;
            const remainingWeightPercent = 100 - lockedWeight;

            let avgNeededInRemaining = 0;
            if (remainingWeightPercent > 0) {
                avgNeededInRemaining = pointsDeficit / (remainingWeightPercent / 100);
            }

            const projections = {
                subject: subjectTarget,
                cuts: {},
                grades: {},
                isSubjectFull: cutData.every(c => c.isCutFull)
            };

            cutData.forEach(cut => {
                if (!cut.isCutFull) {
                    let cutDeficit = avgNeededInRemaining - cut.currentCutScore;
                    let remainingGradeWeight = 100 - cut.filledGradeWeight;
                    let avgNeededInGrades = 0;

                    if (remainingGradeWeight > 0) {
                        avgNeededInGrades = cutDeficit / (remainingGradeWeight / 100);
                    }

                    projections.cuts[cut.id] = avgNeededInGrades;
                    cut.grades.forEach(grade => {
                        if (grade.value === "" || grade.value === null) {
                            projections.grades[grade.id] = avgNeededInGrades;
                        }
                    });
                }
            });

            return { projections, currentSubjectScore };
        }

        const els = {
            viewList: document.getElementById('viewList'),
            viewDetail: document.getElementById('viewDetail'),
            subjectsGrid: document.getElementById('subjectsGrid'),
            globalTarget: document.getElementById('globalTarget'),
            detailSubjectName: document.getElementById('detailSubjectName'),
            detailSubjectAvg: document.getElementById('detailSubjectAvg'),
            cutsContainer: document.getElementById('cutsContainer'),
            globalResultBanner: document.getElementById('globalResultBanner'),
            subjectProjectionContainer: document.getElementById('subjectProjectionContainer'),
            btnFinishSubject: document.getElementById('btnFinishSubject'),
            btnAddCut: document.getElementById('btnAddCut'),
            modals: {
                subject: document.getElementById('modalSubject'),
                cut: document.getElementById('modalCut'),
                grade: document.getElementById('modalGrade')
            }
        };

        function renderSubjectList() {
            els.subjectsGrid.innerHTML = '';
            const addCard = document.createElement('div');
            addCard.className = 'subject-card add-subject-card';
            addCard.innerHTML = `<i class="fas fa-plus-circle"></i><h3>Registrar Materia</h3>`;
            addCard.onclick = () => openModal('subject');
            els.subjectsGrid.appendChild(addCard);

            state.subjects.forEach(sub => {
                let score = 0;
                sub.cuts.forEach(c => {
                    let cs = 0;
                    c.grades.forEach(g => { if(g.value!=="") cs += (parseFloat(g.value)*g.weight/100); });
                    score += (cs * (c.weight/100));
                });

                // CORRECCIÓN: Si está terminada, NO mostramos Meta Ajustada, solo la nota final.
                let metaHtml = '';
                let warningHtml = '';

                if (sub.isFinished) {
                    metaHtml = `<span style="color:var(--text-secondary)">Nota Final</span>`;
                } else {
                    const { target: adjustedTarget, isCapped, finalMaxAvg } = getSubjectCompensationTarget(sub.id);
                    metaHtml = `<span>Meta Ajustada: ${parseFloat(adjustedTarget.toFixed(1))}</span>`;
                    
                    if (isCapped) {
                        warningHtml = `<div class="warning-text"><i class="fas fa-exclamation-triangle"></i> Meta >50. Con 50 el promedio global será ${finalMaxAvg ? finalMaxAvg.toFixed(1) : '---'}</div>`;
                    }
                }
                
                const card = document.createElement('div');
                card.className = `subject-card ${sub.isFinished ? 'finished' : ''}`;
                card.onclick = () => openSubject(sub.id);
                
                let color = score >= state.targetGlobal ? 'var(--success)' : (score >= state.targetGlobal * 0.8 ? 'var(--warning)' : 'var(--danger)');
                let statusText = sub.isFinished ? 'FINALIZADA' : 'EN PROGRESO';
                let statusClass = sub.isFinished ? 'status-finished' : 'status-active';

                card.innerHTML = `
                    <h3>${sub.name}</h3>
                    <div class="subject-stats">
                        <div class="subject-grade-display" style="color: ${color}">${parseFloat(score.toFixed(1))}</div>
                        <div class="subject-stats" style="flex-direction:row; justify-content:space-between;">
                            ${metaHtml}
                            <span class="subject-status ${statusClass}">${statusText}</span>
                        </div>
                        ${warningHtml}
                    </div>
                `;
                els.subjectsGrid.appendChild(card);
            });
            
            checkGlobalFinalResult();
        }

        function openSubject(id) {
            state.currentSubjectId = id;
            renderSubjectDetail();
            els.viewList.classList.remove('active');
            els.viewDetail.classList.add('active');
            window.scrollTo(0, 0);
        }

        function goBack() {
            state.currentSubjectId = null;
            renderSubjectList();
            els.viewDetail.classList.remove('active');
            els.viewList.classList.add('active');
        }

        function renderSubjectDetail() {
            const sub = state.subjects.find(s => s.id === state.currentSubjectId);
            if (!sub) return;

            els.detailSubjectName.textContent = sub.name;
            
            let score = 0;
            sub.cuts.forEach(c => {
                let cs = 0;
                c.grades.forEach(g => { if(g.value!=="") cs += (parseFloat(g.value)*g.weight/100); });
                score += (cs * (c.weight/100));
            });
            els.detailSubjectAvg.textContent = parseFloat(score.toFixed(1));

            // Si está finalizada, no mostramos proyecciones internas, solo resultado
            let subjectTarget = state.targetGlobal;
            if (!sub.isFinished) {
                const { target } = getSubjectCompensationTarget(sub.id);
                subjectTarget = target;
            }

            const { projections, currentSubjectScore } = calculateCascadingProjections(sub, subjectTarget);

            checkGlobalFinalResult();

            if (sub.isFinished) {
                els.btnFinishSubject.innerHTML = `<i class="fas fa-undo"></i> Reabrir Materia`;
                els.btnFinishSubject.className = "btn btn-outline";
                els.btnAddCut.style.display = "none";
            } else {
                els.btnFinishSubject.innerHTML = `<i class="fas fa-check-circle"></i> Finalizar Materia`;
                els.btnFinishSubject.className = "btn btn-success";
                els.btnAddCut.style.display = "inline-flex";
            }

            let bannerHtml = '';
            const avgNeeded = projections.subject;

            if (sub.isFinished) {
                if (score >= state.targetGlobal) {
                    bannerHtml = `<div class="projection-banner" style="border-color:var(--success); color:var(--success);"><i class="fas fa-check-circle"></i> Meta cumplida (${score.toFixed(1)})</div>`;
                } else {
                    bannerHtml = `<div class="projection-banner" style="border-color:var(--danger); color:var(--danger);"><i class="fas fa-times-circle"></i> No alcanzaste meta (${score.toFixed(1)} / ${state.targetGlobal.toFixed(1)})</div>`;
                }
            } else if (avgNeeded < 0) {
                bannerHtml = `<div class="projection-banner" style="border-color:var(--success); color:var(--success);"><i class="fas fa-smile"></i> Promedio Asegurado</div>`;
            } else if (avgNeeded > 50) {
                bannerHtml = `<div class="projection-banner" style="border-color:var(--danger); color:var(--danger);"><i class="fas fa-exclamation-triangle"></i> Imposible (>50)</div>`;
            } else {
                bannerHtml = `<div class="projection-banner">Necesitas promedio de: <span class="projection-number">${parseFloat(avgNeeded.toFixed(1))}</span> en lo restante</div>`;
            }
            els.subjectProjectionContainer.innerHTML = bannerHtml;

            els.cutsContainer.innerHTML = '';
            
            sub.cuts.forEach(cut => {
                const cutCard = document.createElement('div');
                cutCard.className = 'cut-card';
                if (sub.isFinished) cutCard.classList.add('disabled');
                
                let cutScore = 0;
                cut.grades.forEach(g => { if(g.value!=="") cutScore += (parseFloat(g.value)*g.weight/100); });

                let gradesHtml = '';
                cut.grades.forEach(grade => {
                    const needed = projections.grades[grade.id];
                    let ghostHtml = '';
                    
                    if (needed !== undefined) {
                        if (needed < 0) {
                            ghostHtml = `<div class="projection-ghost secured-text">Asegurado</div>`;
                        } else if (needed > 50) {
                            ghostHtml = `<div class="projection-ghost impossible-text">>50</div>`;
                        } else {
                            ghostHtml = `<div class="projection-ghost">Necesitas: ${parseFloat(needed.toFixed(1))}</div>`;
                        }
                    }

                    gradesHtml += `
                        <div class="grade-row">
                            <div class="grade-info">
                                <div class="grade-name">${grade.name}</div>
                                <div class="grade-subinfo">${grade.weight}% del corte</div>
                            </div>
                            <div class="grade-input-wrapper">
                                <input type="number" class="grade-input" min="0" max="50" value="${grade.value}" placeholder="" 
                                    ${sub.isFinished ? 'disabled' : ''}
                                    oninput="updateGrade('${cut.id}', '${grade.id}', this.value)">
                                ${ghostHtml}
                            </div>
                            ${!sub.isFinished ? `<button class="btn-icon" onclick="deleteGrade('${cut.id}', '${grade.id}')"><i class="fas fa-times"></i></button>` : ''}
                        </div>
                    `;
                });

                if (cut.grades.length === 0) gradesHtml = '<p style="color:var(--text-secondary); font-style:italic; padding:10px 0;">Sin notas.</p>';

                let cutProjHtml = '';
                const cutNeeded = projections.cuts[cut.id];
                
                if (cut.grades.every(g => g.value !== "")) {
                    cutProjHtml = `<div class="cut-projection" style="color:var(--text-primary)">Finalizado: <span>${parseFloat(cutScore.toFixed(1))}</span></div>`;
                } else if (cutNeeded !== undefined && !sub.isFinished) {
                    if (cutNeeded < 0) {
                        cutProjHtml = `<div class="cut-projection" style="color:var(--success)">Asegurado</div>`;
                    } else if (cutNeeded > 50) {
                        cutProjHtml = `<div class="cut-projection" style="color:var(--danger)">>50</div>`;
                    } else {
                        cutProjHtml = `<div class="cut-projection">Necesita: <span>${parseFloat(cutNeeded.toFixed(1))}</span></div>`;
                    }
                } else if (sub.isFinished) {
                     cutProjHtml = `<div class="cut-projection" style="color:var(--text-secondary)">Nota: <span>${parseFloat(cutScore.toFixed(1))}</span></div>`;
                }

                cutCard.innerHTML = `
                    <div class="cut-header">
                        <div class="cut-info">
                            <h3>${cut.name}</h3>
                            ${cutProjHtml}
                        </div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <div class="cut-weight-badge">${cut.weight}%</div>
                            ${!sub.isFinished ? `
                            <button class="btn-icon add" onclick="openModalForGrade('${cut.id}')"><i class="fas fa-plus-circle fa-lg"></i></button>
                            <button class="btn-icon" onclick="deleteCut('${cut.id}')"><i class="fas fa-trash"></i></button>
                            ` : ''}
                        </div>
                    </div>
                    <div class="grades-list">${gradesHtml}</div>
                `;
                els.cutsContainer.appendChild(cutCard);
            });
        }

        function checkGlobalFinalResult() {
            const finishedSubjects = state.subjects.filter(s => s.isFinished);
            els.globalResultBanner.innerHTML = ''; 

            // Mostrar banner global solo si todas están terminadas
            if (state.subjects.length > 0 && finishedSubjects.length === state.subjects.length) {
                let totalSum = 0;
                finishedSubjects.forEach(sub => {
                    let score = 0;
                    sub.cuts.forEach(c => {
                        let cs = 0;
                        c.grades.forEach(g => { if(g.value!=="") cs += (parseFloat(g.value)*g.weight/100); });
                        score += (cs * (c.weight/100));
                    });
                    totalSum += score;
                });
                const finalAvg = totalSum / finishedSubjects.length;
                const passed = finalAvg >= state.targetGlobal;

                if (passed) {
                    els.globalResultBanner.innerHTML = `
                        <div class="congrats-msg">
                            <i class="fas fa-trophy fa-2x"></i>
                            <div>
                                <h3>¡Resultado Global Final!</h3>
                                <p>Cumpliste tu meta. Promedio: <strong>${finalAvg.toFixed(1)}</strong></p>
                            </div>
                        </div>`;
                } else {
                    els.globalResultBanner.innerHTML = `
                        <div class="fail-msg">
                            <i class="fas fa-times-circle fa-2x"></i>
                            <div>
                                <h3>Resultado Global Final</h3>
                                <p>No cumpliste tu meta. Promedio: <strong>${finalAvg.toFixed(1)}</strong> / Meta: ${state.targetGlobal}</p>
                            </div>
                        </div>`;
                }
            }
        }

        function updateGrade(cutId, gradeId, value) {
            const sub = state.subjects.find(s => s.id === state.currentSubjectId);
            const cut = sub.cuts.find(c => c.id === cutId);
            const grade = cut.grades.find(g => g.id === gradeId);
            grade.value = value;
            renderSubjectDetail();
            saveToLocal(); // Guardar al escribir nota
        }

        // CORRECCIÓN FUNCIÓN FINALIZAR
        window.toggleSubjectFinish = function() {
            const sub = state.subjects.find(s => s.id === state.currentSubjectId);
            if (!sub) {
                console.error("No se encontró la materia");
                return;
            }

            if (!sub.isFinished) {
                if (sub.cuts.length === 0) {
                    alert("Esta materia está vacía. Agrega cortes y notas antes de finalizar.");
                    return;
                }
                if (confirm("¿Finalizar esta materia? No podrás editar las notas después y esta nota se fijará para el cálculo global.")) {
                    sub.isFinished = true;
                    // Forzar actualización
                    renderSubjectDetail();
                    renderSubjectList();
                    saveToLocal(); // Guardar cambio
                }
            } else {
                if (confirm("¿Reabrir esta materia? Podrás editar notas nuevamente.")) {
                    sub.isFinished = false;
                    renderSubjectDetail();
                    renderSubjectList();
                    saveToLocal(); // Guardar cambio
                }
            }
        };

        window.openModal = (type) => els.modals[type].classList.add('active');
        window.openModalForGrade = (cutId) => { 
            const sub = state.subjects.find(s => s.id === state.currentSubjectId);
            if(sub.isFinished) { alert("Reabre la materia para agregar notas."); return; }
            state.tempCutId = cutId; 
            els.modals.grade.classList.add('active'); 
        };
        window.closeModals = () => { Object.values(els.modals).forEach(m => m.classList.remove('active')); document.querySelectorAll('.form-control').forEach(i => i.value = ''); };

        window.saveSubject = () => {
            const name = document.getElementById('subNameInput').value;
            if (!name) return;
            state.subjects.push({ id: generateId(), name: name, cuts: [], isFinished: false });
            closeModals(); renderSubjectList();
            saveToLocal(); // Guardar materia
        };
        window.saveCut = () => {
            const name = document.getElementById('cutNameInput').value;
            const weight = parseFloat(document.getElementById('cutWeightInput').value);
            if (!name || !weight) return;
            const sub = state.subjects.find(s => s.id === state.currentSubjectId);
            sub.cuts.push({ id: generateId(), name: name, weight: weight, grades: [] });
            closeModals(); renderSubjectDetail();
            saveToLocal(); // Guardar corte
        };
        window.saveGrade = () => {
            const name = document.getElementById('gradeNameInput').value;
            const weight = parseFloat(document.getElementById('gradeWeightInput').value);
            if (!name || !weight) return;
            const sub = state.subjects.find(s => s.id === state.currentSubjectId);
            const cut = sub.cuts.find(c => c.id === state.tempCutId);
            cut.grades.push({ id: generateId(), name: name, weight: weight, value: "" });
            closeModals(); renderSubjectDetail();
            saveToLocal(); // Guardar nota
        };
        window.deleteCurrentSubject = () => { 
            if(confirm("¿Borrar materia?")) { 
                state.subjects = state.subjects.filter(s => s.id !== state.currentSubjectId); 
                goBack(); 
                saveToLocal(); // Guardar borrado
            }
        };
        window.deleteCut = (cutId) => { 
            if(confirm("¿Borrar corte?")) { 
                const sub = state.subjects.find(s => s.id === state.currentSubjectId); 
                sub.cuts = sub.cuts.filter(c => c.id !== cutId); 
                renderSubjectDetail();
                saveToLocal(); // Guardar borrado
            }
        };
        window.deleteGrade = (cutId, gradeId) => { 
            if(confirm("¿Borrar nota?")) { 
                const sub = state.subjects.find(s => s.id === state.currentSubjectId); 
                const cut = sub.cuts.find(c => c.id === cutId); 
                cut.grades = cut.grades.filter(g => g.id !== gradeId); 
                renderSubjectDetail();
                saveToLocal(); // Guardar borrado
            }
        };

        els.globalTarget.addEventListener('change', (e) => {
            let v = parseFloat(e.target.value);
            if(v > 50) v = 50; if(v < 0) v = 0;
            state.targetGlobal = v;
            if(state.currentSubjectId) renderSubjectDetail();
            else renderSubjectList();
            saveToLocal(); // Guardar meta global
        });

        renderSubjectList();
    </script>
</body>
</html>
