<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thynka - Herramientas Educativas</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@7030&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b6b47;
            --primary-light: #a3846c;
            --primary-dark: #6b5538;
            --cream: #f8f5f2;
            --beige: #f0e6dc;
            --brown: #5a4032;
            --gray: #9a9a9a;
            --white: #ffffff;
            --bg-primary: #f8f5f2;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0e6dc;
            --border-color: #f0e6dc;
            --text-primary: #5a4032;
            --text-secondary: #9a9a9a;
            --text-muted: #bfbfbf;
            --shadow-sm: 0 2px 5px rgba(107, 85, 56, 0.05);
            --shadow-md: 0 4px 15px rgba(107, 85, 56, 0.1);
            --shadow-lg: 0 10px 30px rgba(107, 85, 56, 0.15);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-med: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
            --header-height: 80px;
        }

        [data-theme="dark"] {
            --primary: #a3846c;
            --primary-light: #c0a686;
            --primary-dark: #8b6b47;
            --cream: #2a2520;
            --beige: #3a342e;
            --brown: #e0d5c7;
            --gray: #a89b8b;
            --white: #1a1815;
            --text-primary: #e0d5c7;
            --text-secondary: #a89b8b;
            --bg-primary: #1a1815;
            --bg-secondary: #2a2520;
            --bg-tertiary: #3a342e;
            --border-color: #3a342e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        body { display: flex; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-light); }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0; top: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            box-shadow: 2px 0 15px var(--shadow-md);
            z-index: 999;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-med);
            transform: translateX(-100%);
        }

        .sidebar.active { transform: translateX(0); }

        .sidebar-header {
            padding: 30px 25px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sidebar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--primary-dark);
            letter-spacing: 1px;
            text-decoration: none;
        }

        .sidebar-menu {
            flex: 1;
            padding: 20px 0;
            overflow-y: auto;
        }

        .menu-section-title {
            padding: 15px 30px 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 30px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--transition-fast);
            border-left: 3px solid transparent;
            margin: 2px 0;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .menu-item i {
            width: 24px;
            font-size: 1.1rem;
            margin-right: 15px;
            opacity: 0.7;
            transition: opacity var(--transition-fast);
        }

        .menu-item:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .menu-item.active {
            background: var(--bg-primary);
            color: var(--primary-dark);
            border-left-color: var(--primary);
            font-weight: 600;
        }

        .menu-item.active i { opacity: 1; color: var(--primary); }

        /* Controles */
        .menu-toggle {
            position: fixed;
            left: 20px; top: 20px;
            width: 50px; height: 50px;
            background: var(--primary);
            border: none;
            border-radius: 15px;
            color: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-fast);
        }

        .menu-toggle:hover { transform: scale(1.05); box-shadow: var(--shadow-lg); }

        .theme-toggle {
            position: fixed;
            right: 20px; top: 20px;
            width: 50px; height: 50px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            z-index: 1000;
            transition: all var(--transition-fast);
        }

        .theme-toggle:hover { transform: rotate(20deg) scale(1.1); }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-med);
            z-index: 998;
            backdrop-filter: blur(4px);
        }

        .overlay.active { opacity: 1; visibility: visible; }

        /* Layout Principal */
        .main-container {
            flex: 1;
            margin-left: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: var(--header-height);
        }

        .main-header {
            height: var(--header-height);
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 10;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--primary-dark);
            margin-left: 60px;
        }

        .header-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .content-wrapper {
            flex: 1;
            padding: 25px 30px;
            overflow-y: auto;
            background: var(--bg-primary);
        }

        /* Search */
        .search-container {
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            max-width: 500px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 50px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 107, 71, 0.1);
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .filter-tab {
            padding: 10px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .filter-tab:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .filter-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Category Section */
        .category-section {
            margin-bottom: 40px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        .category-icon {
            width: 42px;
            height: 42px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .category-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .category-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 4px 12px;
            border-radius: 20px;
            margin-left: auto;
        }

        /* Tools Grid */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }

        .tool-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: all var(--transition-fast);
            cursor: pointer;
            text-decoration: none;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .tool-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            flex-shrink: 0;
        }

        .tool-info {
            flex: 1;
            min-width: 0;
        }

        .tool-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-name .external-icon {
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .tool-card:hover .tool-name .external-icon {
            opacity: 1;
        }

        .tool-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .tool-tag {
            display: inline-block;
            padding: 3px 10px;
            background: var(--bg-tertiary);
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 6px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tool-tag.free { background: rgba(22, 163, 74, 0.15); color: #16a34a; }
        .tool-tag.freemium { background: rgba(37, 99, 235, 0.15); color: #2563eb; }
        .tool-tag.paid { background: rgba(217, 119, 6, 0.15); color: #d97706; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.4;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--bg-secondary);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Playfair Display', serif;
        }

        .stat-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-header { padding: 0 15px; }
            .header-title { font-size: 1.4rem; margin-left: 50px; }
            .content-wrapper { padding: 15px; }
            .tools-grid { grid-template-columns: 1fr; }
            .stats-bar { flex-direction: column; gap: 10px; }
            .stat-item { justify-content: center; }
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.4s ease forwards;
            opacity: 0;
        }

        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.1s; }
        .delay-3 { animation-delay: 0.15s; }
        .delay-4 { animation-delay: 0.2s; }
        .delay-5 { animation-delay: 0.25s; }
    </style>
</head>

                categoryIcon: "fas fa-video",
                tools: [
                    { name: "CapCut", url: "https://www.capcut.com/es-es/", desc: "Editor de video gratuito con efectos y herramientas profesionales", type: "freemium", icon: "fas fa-cut" },
                    { name: "Clipchamp", url: "https://clipchamp.com/es/", desc: "Editor de video online de Microsoft, facil y rapido", type: "free", icon: "fas fa-film" },
                    { name: "Loom", url: "https://www.loom.com/", desc: "Graba videos de pantalla y camara para explicaciones rapidas", type: "freemium", icon: "fas fa-circle" },
                    { name: "Audacity", url: "https://www.audacityteam.org/", desc: "Editor de audio gratuito y de codigo abierto", type: "free", icon: "fas fa-headphones" },
                    { name: "OpenShot", url: "https://www.openshot.org/es/", desc: "Editor de video gratuito y facil de usar", type: "free", icon: "fas fa-photo-video" },
                    { name: "Veed.io", url: "https://www.veed.io/", desc: "Editor de video online con subtitulos automaticos", type: "freemium", icon: "fas fa-closed-captioning" },
                    { name: "InVideo", url: "https://invideo.io/", desc: "Crea videos profesionales con plantillas predisenadas", type: "freemium", icon: "fas fa-play-circle" },
                    { name: "Kdenlive", url: "https://kdenlive.org/es/", desc: "Editor de video profesional gratuito y de codigo abierto", type: "free", icon: "fas fa-video" },
                    { name: "FlexClip", url: "https://www.flexclip.com/es/", desc: "Creador de videos online con plantillas y stock gratuito", type: "freemium", icon: "fas fa-photo-film" }
                ]
            },
            // Notas y Organizacion
            {
                category: "notas",
                categoryName: "Notas y Organizacion",
                categoryIcon: "fas fa-sticky-note",
                tools: [
                    { name: "Obsidian", url: "https://obsidian.md/", desc: "App de notas con vinculos para crear tu segunda mente digital", type: "free", icon: "fas fa-link" },
                    { name: "Notion", url: "https://www.notion.com/es", desc: "Espacio de trabajo todo en uno para notas, tareas y proyectos", type: "freemium", icon: "fas fa-cube" },
                    { name: "Microsoft OneNote", url: "https://www.onenote.com/", desc: "Cuaderno digital de Microsoft para organizar tus apuntes", type: "free", icon: "fas fa-book" }
                ]
            },
            // Aprendizaje
            {
                category: "aprendizaje",
                categoryName: "Aprendizaje y Cursos",
                categoryIcon: "fas fa-graduation-cap",
                tools: [
                    { name: "Khan Academy", url: "https://es.khanacademy.org/", desc: "Cursos gratuitos en matematicas, ciencias y mas", type: "free", icon: "fas fa-chalkboard-teacher" },
                    { name: "Educatina", url: "https://www.educatina.com/", desc: "Videos educativos para secundaria y preparatoria", type: "free", icon: "fas fa-play" }
                ]
            },
            // Documentos
            {
                category: "documentos",
                categoryName: "Gestion de Documentos",
                categoryIcon: "fas fa-file-alt",
                tools: [
                    { name: "I Love PDF", url: "https://www.ilovepdf.com/es", desc: "Herramientas gratuitas para convertir, comprimir y editar PDFs", type: "free", icon: "fas fa-file-pdf" }
                ]
            },
            // Comunidad Estudiantil
            {
                category: "comunidad",
                categoryName: "Comunidad Estudiantil",
                categoryIcon: "fas fa-users",
                tools: [
                    { name: "Wuolah", url: "https://wuolah.com/", desc: "Plataforma espanola para compartir apuntes universitarios", type: "free", icon: "fas fa-share-alt" },
                    { name: "Knowunity", url: "https://knowunity.es/", desc: "App de apuntes creados por estudiantes para estudiantes", type: "free", icon: "fas fa-user-friends" },
                    { name: "Studocu", url: "https://www.studocu.com/co/home", desc: "Biblioteca de documentos academicos compartidos por estudiantes", type: "freemium", icon: "fas fa-folder-open" }
                ]
            }
        ];

        let currentFilter = 'all';

        // Theme Toggle
        $('btnTheme').onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
            $('btnTheme').innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        };

        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            $('btnTheme').innerHTML = '<i class="fas fa-sun"></i>';
        }

        // Menu Toggle
        $('btnMenu').onclick = () => $('mainSidebar').classList.toggle('active');
        $('overlayPanel').onclick = () => $('mainSidebar').classList.remove('active');

        // Filter Tabs
        $('filterTabs').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-tab')) {
                document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderTools();
            }
        });

        // Search
        $('searchInput').addEventListener('input', (e) => {
            renderTools(e.target.value.toLowerCase());
        });

        // Render Tools
        function renderTools(searchTerm = '') {
            const container = $('toolsContainer');
            let html = '';
            let totalVisible = 0;

            toolsData.forEach((category, catIndex) => {
                const filteredTools = category.tools.filter(tool => {
                    const matchesFilter = currentFilter === 'all' || category.category === currentFilter;
                    const matchesSearch = !searchTerm || 
                        tool.name.toLowerCase().includes(searchTerm) || 
                        tool.desc.toLowerCase().includes(searchTerm);
                    return matchesFilter && matchesSearch;
                });

                if (filteredTools.length === 0) return;

                totalVisible += filteredTools.length;

                html += `
                    <div class="category-section animate-in delay-${(catIndex % 5) + 1}">
                        <div class="category-header">
                            <div class="category-icon">
                                <i class="${category.categoryIcon}"></i>
                            </div>
                            <h2 class="category-title">${category.categoryName}</h2>
                            <span class="category-count">${filteredTools.length} herramientas</span>
                        </div>
                        <div class="tools-grid">
                            ${filteredTools.map(tool => `
                                <a href="${tool.url}" target="_blank" rel="noopener noreferrer" class="tool-card">
                                    <div class="tool-icon">
                                        <i class="${tool.icon}"></i>
                                    </div>
                                    <div class="tool-info">
                                        <div class="tool-name">
                                            ${tool.name}
                                            <i class="fas fa-external-link-alt external-icon"></i>
                                        </div>
                                        <p class="tool-desc">${tool.desc}</p>
                                        <span class="tool-tag ${tool.type}">${tool.type === 'free' ? 'Gratis' : tool.type === 'freemium' ? 'Freemium' : 'De pago'}</span>
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            if (totalVisible === 0) {
                html = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>No se encontraron herramientas</h3>
                        <p>Intenta con otro termino de busqueda</p>
                    </div>
                `;
            }

            container.innerHTML = html;
            $('totalTools').textContent = totalVisible;
        }

        // Auth
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Permitir ver la pagina sin sesion
            }
        });

        // Sign Out
        window.signOut = async () => {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (e) {
                console.error(e);
            }
        };

        // Initialize
        renderTools();
    </script>
</body>
</html>
