<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Mapas Conceptuales IA</title>
    
    <!-- Librerías de código abierto necesarias para dibujar el mapa visual -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .wrapper { width: 100%; max-width: 1000px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #1a1a1a; margin-top: 0; font-size: 24px; }
        .control-panel { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 16px; transition: border 0.3s; }
        input[type="text"]:focus { border-color: #4a90e2; outline: none; }
        button { background-color: #4a90e2; color: white; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #357abd; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #status-msg { margin-bottom: 15px; color: #666; font-style: italic; display: none; }
        
        /* Contenedor del mapa conceptual interactivo */
        .map-container { width: 100%; height: 600px; border: 2px solid #eeeeee; border-radius: 8px; background-color: #fafafa; position: relative; }
        #mindmap { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Generador Instantáneo de Mapas Conceptuales</h1>
    <p>Ingresa cualquier tema para que la IA estructure y dibuje un mapa interactivo sin límites.</p>
    
    <div class="control-panel">
        <input type="text" id="userTopic" placeholder="Ej: El ciclo del agua, Segunda Guerra Mundial, Programación Orientada a Objetos...">
        <button id="btnGenerate" onclick="createConceptMap()">Generar Mapa</button>
    </div>
    
    <div id="status-msg">🤖 La IA está organizando los conceptos, un momento...</div>
    
    <div class="map-container">
        <!-- El mapa se renderiza dinámicamente dentro de esta etiqueta SVG -->
        <svg id="mindmap"></svg>
    </div>
</div>

<script>
// REEMPLAZA ESTO CON TU CLAVE API ACTUAL DE GEMINI
const MY_GEMINI_KEY = "AQ.Ab8RN6KjnMZFOt-aeT4GdJy21LKUKbU0nIZOwmFI22O1wiGgFA"; 

async function createConceptMap() {
    const topicInput = document.getElementById('userTopic');
    const statusMsg = document.getElementById('status-msg');
    const btn = document.getElementById('btnGenerate');
    const topic = topicInput.value.trim();
    
    if (!topic) {
        alert("Por favor, escribe un tema primero.");
        return;
    }
    
    // Bloquear interfaz durante la carga
    statusMsg.style.display = "block";
    btn.disabled = true;
    topicInput.disabled = true;

    // Prompt estricto para asegurar que Gemini responda únicamente en formato Markdown jerárquico
    const promptPayload = {
        contents: [{
            parts: [{
                text: `Actúa como un experto en mapas conceptuales y pedagogía médica y técnica. Crea un mapa conceptual extenso, profundo y muy detallado sobre el tema: "${topic}". 
                
                Reglas obligatorias de formato:
                1. Usa formato Markdown limpio con jerarquías (# para título central, ## para categorías principales, - para subconceptos o conectores).
                2. No agregues introducciones, explicaciones, saludos ni despedidas.
                3. Entrega exclusivamente las líneas de Markdown.`
            }]
        }]
    };

    try {
        // Petición directa al endpoint oficial de Gemini utilizando tu API Key
        const response = await fetch(`https://googleapis.com{MY_GEMINI_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(promptPayload)
        });

        if (!response.ok) throw new Error("Error en la respuesta del servidor de IA");

        const data = await response.json();
        
        // Extraer texto de la respuesta estructurada de Gemini
        let markdownOutput = data.candidates[0].content.parts[0].text;
        
        // Limpieza de seguridad: remueve los bloques tipográficos ```markdown y ``` que la IA suele auto-generar
        markdownOutput = markdownOutput.replace(/```markdown/gi, '').replace(/```/g, '').trim();

        // Inicializar e inyectar los datos en el visualizador Markmap.js
        const { Markmap, loadTransformer } = window.markmap;
        const transformer = await loadTransformer();
        const { root } = transformer.transform(markdownOutput);
        
        // Resetear visualizaciones previas antes de pintar el nuevo mapa
        document.getElementById('mindmap').innerHTML = '';
        
        // Dibujar el mapa (habilita arrastrar con el mouse y hacer zoom con la rueda)
        Markmap.create('#mindmap', null, root);

    } catch (error) {
        console.error("Error al generar el mapa:", error);
        alert("No se pudo generar el mapa conceptual en este momento. Revisa la consola o tu configuración de API.");
    } finally {
        // Desbloquear interfaz
        statusMsg.style.display = "none";
        btn.disabled = false;
        topicInput.disabled = false;
    }
}
</script>

</body>
</html>
